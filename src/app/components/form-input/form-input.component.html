<div class="form__group">
  <label>{{ label }}</label>
  <input
    [formControl]="formControl"
    [type]="type"
    [placeholder]="placeholder"
    [min]="min"
    [max]="max"
  />
  <span class="form__error" *ngIf="formControl.invalid && formControl.touched">
    {{ errorMessage }}
  </span>
</div>
