<div class="form__group">
  <label>{{ label }}</label>
  <textarea
    [formControl]="formControl"
    [placeholder]="placeholder"
    [maxlength]="maxLength"
  ></textarea>
  <span class="form__count"
    >{{ formControl.value?.length || 0 }}/{{ maxLength }}</span
  >
  <span class="form__error" *ngIf="formControl.invalid && formControl.touched">
    {{ errorMessage }}
  </span>
</div>
